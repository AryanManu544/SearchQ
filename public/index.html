<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SearchiQ Semantic Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="SearchiQ is a semantic document search engine powered by a native C++ index, TF-IDF ranking, and word embedding query expansion."
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <canvas id="semantic-background" class="semantic-background" aria-hidden="true"></canvas>
    <div class="bg-grid"></div>
    <div class="page-shell">
      <main class="app">
        <section id="home-view" class="view view-home">
          <div class="hero">
            <div class="logo" aria-label="Search Engine logo">
              <span class="logo-s">S</span>
              <span class="logo-e">e</span>
              <span class="logo-a">a</span>
              <span class="logo-r">r</span>
              <span class="logo-c">c</span>
              <span class="logo-h">h</span>
              <span class="logo-i">i</span>
              <span class="logo-q">Q</span>
            </div>
            <p class="tagline">Semantic document retrieval powered by a native C++ index, TF-IDF ranking, and word embedding query expansion.</p>

            <form id="home-form" class="search-stack" autocomplete="off">
              <div class="search-box search-box-home">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input
                  id="home-search-input"
                  class="search-input"
                  type="text"
                  name="q"
                  placeholder="Search your documents"
                  aria-label="Search"
                />
                <button id="home-search-button" class="search-button" type="submit">
                  Search
                </button>
                <div class="indexing-beam" aria-hidden="true"></div>
              </div>
              <div id="home-autocomplete" class="autocomplete hidden" role="listbox"></div>
            </form>

            <div class="hero-highlights">
              <span class="highlight-chip">Semantic expansion</span>
              <span class="highlight-chip">TF-IDF ranking</span>
              <span class="highlight-chip">Autocomplete</span>
            </div>

            <div class="home-meta">
            </div>
          </div>
        </section>

        <section id="results-view" class="view view-results hidden">
          <header class="results-header">
            <div class="results-brand-row">
              <button id="brand-home-button" class="brand-mark" type="button" aria-label="Go to homepage">
                Searchi<span>Q</span>
              </button>
              <form id="results-form" class="results-search-wrap" autocomplete="off">
                <div class="search-box search-box-results">
                  <span class="search-icon" aria-hidden="true">⌕</span>
                  <input
                    id="results-search-input"
                    class="search-input"
                    type="text"
                    name="q"
                    placeholder="Search your documents"
                    aria-label="Search results query"
                  />
                  <button id="results-search-button" class="search-button" type="submit">
                    Search
                  </button>
                </div>
                <div id="results-autocomplete" class="autocomplete hidden" role="listbox"></div>
              </form>
            </div>
            <div class="results-meta">
              <p id="results-summary" class="results-summary"></p>
            </div>
          </header>

          <section class="results-content">
            <div id="loading-state" class="state-card hidden">Loading...</div>
            <div id="empty-state" class="state-card hidden">No results found</div>
            <div id="error-state" class="state-card hidden"></div>
            <div id="results-list" class="results-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="/config.js"></script>
    <script src="/assets/js/app.js"></script>
  </body>
</html>
